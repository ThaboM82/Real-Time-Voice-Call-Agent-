name: Secret Scan

on:
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Block .env files
        run: |
          if git ls-files | grep -E '\.env($|\.)' | grep -v '\.env.example'; then
            echo "❌ BLOCKED: .env files detected in PR. Aborting."
            exit 1
          fi

      - name: Run GitHub secret scanning
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform secret scan
        run: |
          echo "✅ Secret scanning complete. GitHub will raise alerts if secrets are detected."
